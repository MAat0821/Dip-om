<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз "Студенческая весна"</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎵 Квиз "Студенческая весна"</h1>

        <!-- Кнопка только для ведущего -->
        <button class="btn btn-host" onclick="window.location.href='/host/create'">
             Я Ведущий
        </button>

        <!-- Форма подключения для игроков -->
        <div class="join-form">
            <h3> Присоединиться к игре</h3>
            <input type="text" id="roomCode" placeholder="Код комнаты" maxlength="6"
                   style="text-transform: uppercase; text-align: center; font-size: 1.2rem; letter-spacing: 5px;">
            <input type="text" id="nickname" placeholder="Ваш никнейм">
            <p id="joinError" class="error-message"></p>
            <button class="btn btn-player" onclick="joinGame()">Войти в игру</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
