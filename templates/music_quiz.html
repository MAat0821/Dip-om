{% extends "admin/base.html" %}

{% block content %}
<h2>🎵 Управление музыкой</h2>

<div class="card mb-4">
    <div class="card-body">
        <h5>Загрузить трек</h5>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="text" class="form-control" name="title" placeholder="Название" required>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" name="artist" placeholder="Исполнитель">
            </div>
            <div class="mb-3">
                <input type="file" class="form-control" name="file" accept=".mp3,.wav,.ogg" required>
            </div>
            <button type="submit" class="btn btn-primary">📤 Загрузить</button>
        </form>
    </div>
</div>

<h4>Загруженные треки</h4>
<div class="list-group">
    {% for track in tracks %}
    <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
            <strong>{{ track.title }}</strong> - {{ track.artist }}
        </div>
        <div>
            <audio controls class="me-2" style="height: 30px;">
                <source src="{{ url_for('static', filename='uploads/music/' + track.filename) }}">
            </audio>
            <button class="btn btn-sm btn-danger" onclick="deleteTrack({{ track.id }})">🗑️</button>
        </div>
    </div>
    {% endfor %}
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    
    const response = await fetch('/admin/music/upload', {
        method: 'POST',
        body: formData
    });
    
    if (response.ok) {
        location.reload();
    }
});

async function deleteTrack(id) {
    if (!confirm('Удалить трек?')) return;
    await fetch(`/admin/music/${id}`, {method: 'DELETE'});
    location.reload();
}
</script>
{% endblock %}
